<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Квітковий магазин</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css?v=30">
</head>

<body>
    <div class="tabs-container" id="main-tabs-container">
        <!-- Вкладки генеруються динамічно в app.js -->
    </div>
    <div class="scroll-hint">Свайпайте вправо ➡️ для інших категорій</div>

    <div id="catalog-section" class="section active">
        <div class="products" id="products-grid">
        </div>
    </div>

    <div id="constructor-section" class="section">
        <h2>Створіть свій ідеальний букет 🌸</h2>
        <p class="subtitle">Оберіть квіти поштучно, а ми красиво їх загорнемо.</p>

        <div class="sub-tabs-container" id="sub-tabs-container">
            <!-- Підвкладки генеруються динамічно в app.js -->
        </div>
        <div class="scroll-hint sub-scroll-hint">Свайпайте вправо ➡️</div>

        <div class="products" id="constructor-grid">
        </div>
        <div class="constructor-footer">
            <textarea id="wishes-text" placeholder="Ваші побажання (напр. 'викласти сердечко')"></textarea>
            <button class="btn-primary" onclick="packCustomBouquet()">✨ Загорнути цей букет</button>
        </div>
    </div>

    <div class="floating-cart" onclick="toggleCart()">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span id="cart-badge">0</span>
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleCart()">&times;</span>
            <h2>Ваше замовлення</h2>
            <div id="cart-items-list">
            </div>
            <div class="cart-total">
                Разом: <span id="total-price-text">0</span> грн
            </div>
        </div>
    </div>

    <!-- Модальне вікно деталей товару -->
    <div id="product-modal" class="modal">
        <div class="modal-content product-modal-content">
            <span class="close-btn" onclick="closeProductModal()">&times;</span>
            <img id="pm-image" src="" alt="Product Image">
            <h2 id="pm-title"></h2>
            <div id="pm-desc-container">
                <p id="pm-desc" class="pm-description"></p>
            </div>
            <div class="pm-footer">
                <span id="pm-price" class="pm-price"></span>
                <div class="controls" id="pm-controls">
                    <!-- Буде заповнено через JS -->
                </div>
            </div>
        </div>
    </div>

    <script src="app.js?v=39"></script>
</body>

</html>
