<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Панель менеджера</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="../client/style.css?v=29">
    <link rel="stylesheet" href="manager.css?v=3">
</head>

<body>
    <div class="header">
        <h2>Керування наявністю</h2>
    </div>

    <div class="tabs-container" id="main-tabs-container">
        <!-- Вкладки генеруються динамічно -->
    </div>

    <div class="sub-tabs-container" id="sub-tabs-container">
         <!-- Підвкладки генеруються динамічно -->
    </div>

    <div class="section active">
        <div class="products" id="products-grid">
            <!-- Товари генеруються динамічно -->
        </div>
    </div>

    <!-- Floating Action Button -->
    <div class="fab" onclick="openCreateModal()">
        +
    </div>

    <!-- Модальне вікно редагування -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeEditModal()">&times;</span>
            <h2>Редагування товару</h2>
            <div class="form-group">
                <label>Назва товару</label>
                <input type="text" id="edit-name">
            </div>
            <div class="form-group">
                <label>Опис</label>
                <textarea id="edit-desc" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Ціна (грн)</label>
                <input type="number" id="edit-price">
            </div>
            <div class="form-group">
                <label>Фотографія</label>
                <input type="file" id="edit-image-file" accept="image/*" onchange="uploadImage(this, 'edit-upload-status', 'edit-image-url')">
                <div id="edit-upload-status" style="font-size: 12px; color: #666; margin-top: 5px;"></div>
                <input type="text" id="edit-image-url" placeholder="Або вставте готовий URL" style="margin-top: 5px;">
            </div>
            <button class="save-btn" onclick="saveProduct()">Зберегти</button>
        </div>
    </div>

    <!-- Модальне вікно створення -->
    <div id="create-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeCreateModal()">&times;</span>
            <h2>Створення товару</h2>
            <div class="form-group">
                <label>Назва товару</label>
                <input type="text" id="create-name">
            </div>
            <div class="form-group">
                <label>Опис</label>
                <textarea id="create-desc" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Ціна (грн)</label>
                <input type="number" id="create-price">
            </div>
            <div class="form-group">
                <label>Тип</label>
                <select id="create-type">
                    <option value="flower">Поштучні квіти</option>
                    <option value="composition">Букет / Композиція / Інше</option>
                    <option id="opt-addon" value="addon">🧸 Доповнення (Цукерки, іграшки)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Фотографія</label>
                <input type="file" id="create-image-file" accept="image/*" onchange="uploadImage(this, 'upload-status', 'create-image-url')">
                <div id="upload-status" style="font-size: 12px; color: #666; margin-top: 5px;"></div>
                <input type="text" id="create-image-url" placeholder="Або вставте готовий URL" style="margin-top: 5px;">
            </div>
            <div class="form-group">
                <label>Категорії</label>
                <div id="create-categories-list" class="categories-list">
                    <!-- Чекбокси згенеровані динамічно -->
                </div>
                <div style="display: flex; gap: 5px; margin-top: 10px;">
                    <input type="text" id="new-category-name" placeholder="Нова категорія">
                    <button class="action-btn" style="background-color: #eee; width: auto; padding: 0 10px;" onclick="addNewCategoryCheckbox()">+</button>
                </div>
            </div>
            <button class="save-btn" onclick="submitNewProduct()" style="margin-top: 15px;">Створити</button>
        </div>
    </div>

    <script src="manager.js?v=9"></script>
</body>

</html>
