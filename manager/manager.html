<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Панель менеджера</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="../client/style.css?v=25">
    <link rel="stylesheet" href="manager.css?v=2">
</head>

<body>
    <div class="header">
        <h2>Керування наявністю</h2>
    </div>

    <div class="tabs-container" id="main-tabs-container">
        <!-- Вкладки генеруються динамічно -->
    </div>

    <div class="sub-tabs-container" id="sub-tabs-container">
         <!-- Підвкладки генеруються динамічно -->
    </div>

    <div class="section active">
        <div class="products" id="products-grid">
            <!-- Товари генеруються динамічно -->
        </div>
    </div>

    <!-- Модальне вікно редагування -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeEditModal()">&times;</span>
            <h2>Редагування товару</h2>
            <div class="form-group">
                <label>Назва товару</label>
                <input type="text" id="edit-name">
            </div>
            <div class="form-group">
                <label>Опис</label>
                <textarea id="edit-desc" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Ціна (грн)</label>
                <input type="number" id="edit-price">
            </div>
            <button class="save-btn" onclick="saveProduct()">Зберегти</button>
        </div>
    </div>

    <script src="manager.js?v=3"></script>
</body>

</html>
